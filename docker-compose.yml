version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: ai_biz_os_postgres
    environment:
      POSTGRES_DB: ai_biz_os
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: ai_biz_os_backend
    env_file:
      - ./backend/.env.example
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    container_name: ai_biz_os_frontend
    env_file:
      - ./frontend/.env.example
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:

